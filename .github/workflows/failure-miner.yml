name: Failure-miner

# Autonomous quality agent: reviews recent production translations with Claude and
# proposes new golden-set regression cases for the likely failures. On-demand
# only — NOT scheduled and NOT part of per-commit CI. The watermark that makes
# mining incremental (agent/.mine-state.json) is local and gitignored, so an
# ephemeral runner always starts from scratch: a scheduled run re-judged (and
# re-paid for) the same oldest 50 rows every week and never reached newer ones.
# The recurring mine runs locally on the subscription transport instead.

on:
  workflow_dispatch: # run on demand from the Actions tab
    inputs:
      limit:
        description: "How many recent translations to review"
        required: false
        default: "50"
      threshold:
        description: "Flag translations scoring at or below this (1-5)"
        required: false
        default: "3"

jobs:
  mine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Mine recent translations for new eval cases
        run: npm run mine
        env:
          MINE_LIMIT: ${{ github.event.inputs.limit || '50' }}
          MINE_THRESHOLD: ${{ github.event.inputs.threshold || '3' }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Upload proposed cases
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: golden-case-proposals
          path: agent/proposals/
          if-no-files-found: ignore
